services:
  web:
    image: cbotelho80/infodoc-web:${WEB_IMAGE_TAG:-${IMAGE_TAG:-1.0.16}}
    command: ["apache2-foreground"]
    container_name: infodoc-web
    restart: unless-stopped
    depends_on:
      - assinador-python
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_SERVER_PORT: ${DB_SERVER_PORT}
      DB_SERVER_USERNAME: ${DB_SERVER_USERNAME}
      DB_SERVER_PASSWORD: ${DB_SERVER_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PYTHON_SERVICE_INTERNAL_URL: http://assinador-python:5000
      PYTHON_SERVICE_PUBLIC_URL: ${PYTHON_SERVICE_PUBLIC_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      FILE_STORAGE_R2_ENDPOINT: ${FILE_STORAGE_R2_ENDPOINT}
      FILE_STORAGE_R2_REGION: ${FILE_STORAGE_R2_REGION}
      FILE_STORAGE_R2_BUCKET: ${FILE_STORAGE_R2_BUCKET}
      FILE_STORAGE_R2_ACCESS_KEY_ID: ${FILE_STORAGE_R2_ACCESS_KEY_ID}
      FILE_STORAGE_R2_SECRET_ACCESS_KEY: ${FILE_STORAGE_R2_SECRET_ACCESS_KEY}
      FILE_STORAGE_R2_OBJECT_PREFIX: ${FILE_STORAGE_R2_OBJECT_PREFIX}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-1024M}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-1024M}
      PHP_MAX_FILE_UPLOADS: ${PHP_MAX_FILE_UPLOADS:-100}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-1200}
      PHP_MAX_INPUT_TIME: ${PHP_MAX_INPUT_TIME:-1200}
      PHP_MAX_INPUT_VARS: ${PHP_MAX_INPUT_VARS:-5000}
      PHP_DATE_TIMEZONE: ${PHP_DATE_TIMEZONE:-America/Sao_Paulo}
      PHP_DISPLAY_ERRORS: ${PHP_DISPLAY_ERRORS:-Off}
      PHP_LOG_ERRORS: ${PHP_LOG_ERRORS:-On}
    ports:
      - "${APP_PORT:-18081}:80"
    volumes:
      - infodoc_backups:/var/www/html/backups
      - infodoc_uploads:/var/www/html/uploads
      - infodoc_cache:/var/www/html/cache
      - infodoc_tmp:/var/www/html/tmp
      - infodoc_log:/var/www/html/log
    networks:
      - default
      - proxy

  file-storage-worker:
    image: cbotelho80/infodoc-file-storage-worker:${WORKER_IMAGE_TAG:-${IMAGE_TAG:-1.0.16}}
    container_name: infodoc-file-storage-worker
    restart: unless-stopped
    depends_on:
      - web
    environment:
      DB_SERVER: ${DB_SERVER}
      DB_SERVER_PORT: ${DB_SERVER_PORT}
      DB_SERVER_USERNAME: ${DB_SERVER_USERNAME}
      DB_SERVER_PASSWORD: ${DB_SERVER_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FILE_STORAGE_R2_ENDPOINT: ${FILE_STORAGE_R2_ENDPOINT}
      FILE_STORAGE_R2_REGION: ${FILE_STORAGE_R2_REGION}
      FILE_STORAGE_R2_BUCKET: ${FILE_STORAGE_R2_BUCKET}
      FILE_STORAGE_R2_ACCESS_KEY_ID: ${FILE_STORAGE_R2_ACCESS_KEY_ID}
      FILE_STORAGE_R2_SECRET_ACCESS_KEY: ${FILE_STORAGE_R2_SECRET_ACCESS_KEY}
      FILE_STORAGE_R2_OBJECT_PREFIX: ${FILE_STORAGE_R2_OBJECT_PREFIX}
      FILE_STORAGE_CRON_INTERVAL: ${FILE_STORAGE_CRON_INTERVAL}
    command: >-
      sh -c "while true; do php /var/www/html/cron/file_storage.php; sleep \"$${FILE_STORAGE_CRON_INTERVAL}\"; done"
    volumes:
      - infodoc_backups:/var/www/html/backups
      - infodoc_uploads:/var/www/html/uploads
      - infodoc_cache:/var/www/html/cache
      - infodoc_tmp:/var/www/html/tmp
      - infodoc_log:/var/www/html/log
    networks:
      - default
      - proxy

  assinador-python:
    image: cbotelho80/infodoc-assinador-python:${SIGNER_IMAGE_TAG:-${IMAGE_TAG:-1.0.16}}
    container_name: infodoc-assinador
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SIGNER_SECRET_KEY}
      TOKEN_EXPIRY: ${TOKEN_EXPIRY}
      UPLOAD_DIR: /app/uploads
      CERT_DIR: /app/certs
      TEMP_DIR: /app/temp
      FILE_STORAGE_R2_ENDPOINT: ${FILE_STORAGE_R2_ENDPOINT}
      FILE_STORAGE_R2_REGION: ${FILE_STORAGE_R2_REGION}
      FILE_STORAGE_R2_BUCKET: ${FILE_STORAGE_R2_BUCKET}
      FILE_STORAGE_R2_ACCESS_KEY_ID: ${FILE_STORAGE_R2_ACCESS_KEY_ID}
      FILE_STORAGE_R2_SECRET_ACCESS_KEY: ${FILE_STORAGE_R2_SECRET_ACCESS_KEY}
      FILE_STORAGE_R2_OBJECT_PREFIX: ${FILE_STORAGE_R2_OBJECT_PREFIX}
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: false
      PYTHON_SERVICE_INTERNAL_URL: http://assinador-python:5000
      PYTHON_SERVICE_PUBLIC_URL: ${PYTHON_SERVICE_PUBLIC_URL}
      APP_BASE_URL: ${APP_BASE_URL}
    ports:
      - "${SIGNER_PORT:-15000}:5000"
    volumes:
      - signer_certs:/app/certs
      - signer_temp:/app/temp
      - signer_logs:/app/logs
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_EXTERNAL_NETWORK:-proxy_net}

volumes:
  infodoc_backups:
  infodoc_uploads:
  infodoc_cache:
  infodoc_tmp:
  infodoc_log:
  signer_certs:
  signer_temp:
  signer_logs: