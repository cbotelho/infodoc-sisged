services:
  web:
    image: infodoc-web:${IMAGE_TAG:-1.0.20}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infodoc-web
    depends_on:
      - assinador-python
    environment:
      DB_SERVER: ${DB_SERVER:-host.docker.internal}
      DB_SERVER_PORT: ${DB_SERVER_PORT:-3306}
      DB_SERVER_USERNAME: ${DB_SERVER_USERNAME:-root}
      DB_SERVER_PASSWORD: ${DB_SERVER_PASSWORD:-}
      DB_DATABASE: ${DB_DATABASE:-infodoc_sisged}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-infodoc_sisged}
      PYTHON_SERVICE_INTERNAL_URL: ${PYTHON_SERVICE_INTERNAL_URL:-http://assinador-python:5000}
      PYTHON_SERVICE_PUBLIC_URL: ${PYTHON_SERVICE_PUBLIC_URL:-http://localhost:5000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      FILE_STORAGE_R2_ENDPOINT: ${FILE_STORAGE_R2_ENDPOINT:-}
      FILE_STORAGE_R2_REGION: ${FILE_STORAGE_R2_REGION:-auto}
      FILE_STORAGE_R2_BUCKET: ${FILE_STORAGE_R2_BUCKET:-}
      FILE_STORAGE_R2_ACCESS_KEY_ID: ${FILE_STORAGE_R2_ACCESS_KEY_ID:-}
      FILE_STORAGE_R2_SECRET_ACCESS_KEY: ${FILE_STORAGE_R2_SECRET_ACCESS_KEY:-}
      FILE_STORAGE_R2_OBJECT_PREFIX: ${FILE_STORAGE_R2_OBJECT_PREFIX:-}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-1024M}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-1024M}
      PHP_MAX_FILE_UPLOADS: ${PHP_MAX_FILE_UPLOADS:-100}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-1200}
      PHP_MAX_INPUT_TIME: ${PHP_MAX_INPUT_TIME:-1200}
      PHP_MAX_INPUT_VARS: ${PHP_MAX_INPUT_VARS:-5000}
      PHP_DATE_TIMEZONE: ${PHP_DATE_TIMEZONE:-America/Sao_Paulo}
      PHP_DISPLAY_ERRORS: ${PHP_DISPLAY_ERRORS:-Off}
      PHP_LOG_ERRORS: ${PHP_LOG_ERRORS:-On}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - r2_vendor:/var/www/html/plugins/ext/file_storage_modules/r2/vendor

  assinador-python:
    image: infodoc-assinador-python:${IMAGE_TAG:-1.0.20}
    build:
      context: ./assinador-python
      dockerfile: Dockerfile
    container_name: infodoc-assinador
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-infodoc_sisged}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      SECRET_KEY: ${SIGNER_SECRET_KEY:-change-this-docker-secret}
      TOKEN_EXPIRY: ${TOKEN_EXPIRY:-3600}
      UPLOAD_DIR: /app/uploads
      CERT_DIR: /app/certs
      TEMP_DIR: /app/temp
      FILE_STORAGE_R2_ENDPOINT: ${FILE_STORAGE_R2_ENDPOINT:-}
      FILE_STORAGE_R2_REGION: ${FILE_STORAGE_R2_REGION:-auto}
      FILE_STORAGE_R2_BUCKET: ${FILE_STORAGE_R2_BUCKET:-}
      FILE_STORAGE_R2_ACCESS_KEY_ID: ${FILE_STORAGE_R2_ACCESS_KEY_ID:-}
      FILE_STORAGE_R2_SECRET_ACCESS_KEY: ${FILE_STORAGE_R2_SECRET_ACCESS_KEY:-}
      FILE_STORAGE_R2_OBJECT_PREFIX: ${FILE_STORAGE_R2_OBJECT_PREFIX:-ged}
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: false
      PYTHON_SERVICE_INTERNAL_URL: http://assinador-python:5000
      PYTHON_SERVICE_PUBLIC_URL: ${PYTHON_SERVICE_PUBLIC_URL:-http://localhost:5000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "${SIGNER_PORT:-5000}:5000"
    volumes:
      - ./assinador-python:/app

volumes:
  r2_vendor:
